<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rhwp - HWP Editor</title>
    <link rel="stylesheet" href="editor.css">
    <script>
    // HWP 문서에서 자주 사용되는 폰트를 미리 로드
    // 한컴 webhwp CSS(@font-face) 매핑 기준 + HWP 문서에서 사용하는 별칭 추가
    (function() {
        // 함초롬체 CDN (눈누 jsdelivr — 비상업적 사용, 한컴 라이선스)
        const CDN_HAMCHOB_R = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2104@1.0/HANBatang.woff';
        const CDN_HAMCHOB_B = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2104@1.0/HANBatangB.woff';
        const CDN_HAMCHOD_R = 'https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.0/HCRDotum.woff';
        const fonts = [
            // === 함초롬/함초롱/한컴 폰트 (CDN 참조) ===
            { name: '함초롬돋움', file: CDN_HAMCHOD_R, format: 'woff' },
            { name: '함초롬바탕', file: CDN_HAMCHOB_R, format: 'woff' },
            { name: '함초롱돋움', file: CDN_HAMCHOD_R, format: 'woff' },
            { name: '함초롱바탕', file: CDN_HAMCHOB_R, format: 'woff' },
            { name: '한컴돋움', file: CDN_HAMCHOD_R, format: 'woff' },
            { name: '한컴바탕', file: CDN_HAMCHOB_R, format: 'woff' },
            { name: '새돋움', file: CDN_HAMCHOD_R, format: 'woff' },
            { name: '새바탕', file: CDN_HAMCHOB_R, format: 'woff' },
            // === 한컴 HY 폰트 → 오픈소스 대체 ===
            { name: 'HY헤드라인M', file: 'fonts/NotoSansKR-Bold.woff2' },
            { name: 'HYHeadLine M', file: 'fonts/NotoSansKR-Bold.woff2' },
            { name: 'HYHeadLine Medium', file: 'fonts/NotoSansKR-Bold.woff2' },
            { name: 'HY견고딕', file: 'fonts/NotoSansKR-Bold.woff2' },
            { name: 'HYGothic-Extra', file: 'fonts/NotoSansKR-Bold.woff2' },
            { name: 'HY그래픽', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: 'HYGraphic-Medium', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: 'HY그래픽M', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: 'HY견명조', file: 'fonts/NotoSerifKR-Bold.woff2' },
            { name: 'HYMyeongJo-Extra', file: 'fonts/NotoSerifKR-Bold.woff2' },
            { name: 'HY신명조', file: 'fonts/NotoSerifKR-Regular.woff2' },
            { name: 'HY중고딕', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: '양재튼튼체B', file: 'fonts/NotoSansKR-Bold.woff2' },
            // === 한글 시스템 폰트 → 오픈소스 대체 ===
            { name: 'Malgun Gothic', file: 'fonts/Pretendard-Regular.woff2' },
            { name: '맑은 고딕', file: 'fonts/Pretendard-Regular.woff2' },
            { name: '돋움', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: '돋움체', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: '굴림', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: '굴림체', file: 'fonts/D2Coding-Regular.woff2' },
            { name: '새굴림', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: '바탕', file: 'fonts/NotoSerifKR-Regular.woff2' },
            { name: '바탕체', file: 'fonts/D2Coding-Regular.woff2' },
            { name: '궁서', file: 'fonts/GowunBatang-Regular.woff2' },
            { name: '궁서체', file: 'fonts/GowunBatang-Regular.woff2' },
            { name: '새궁서', file: 'fonts/GowunBatang-Regular.woff2' },
            // === 나눔 폰트 (OFL) ===
            { name: '나눔고딕', file: 'fonts/NanumGothic-Regular.woff2' },
            { name: '나눔명조', file: 'fonts/NanumMyeongjo-Regular.woff2' },
            { name: '나눔고딕코딩', file: 'fonts/NanumGothicCoding-Regular.woff2' },
            // === 영문 폰트 → OS 폴백 ===
            { name: 'Palatino Linotype', file: 'fonts/NotoSerifKR-Regular.woff2' },
            // === Noto (OFL) ===
            { name: 'Noto Sans KR', file: 'fonts/NotoSansKR-Regular.woff2' },
            { name: 'Noto Serif KR', file: 'fonts/NotoSerifKR-Regular.woff2' },
            // === Pretendard (9 weights) ===
            { name: 'Pretendard', file: 'fonts/Pretendard-Regular.woff2' },
            { name: 'Pretendard Thin', file: 'fonts/Pretendard-Thin.woff2' },
            { name: 'Pretendard ExtraLight', file: 'fonts/Pretendard-ExtraLight.woff2' },
            { name: 'Pretendard Light', file: 'fonts/Pretendard-Light.woff2' },
            { name: 'Pretendard Medium', file: 'fonts/Pretendard-Medium.woff2' },
            { name: 'Pretendard SemiBold', file: 'fonts/Pretendard-SemiBold.woff2' },
            { name: 'Pretendard Bold', file: 'fonts/Pretendard-Bold.woff2' },
            { name: 'Pretendard ExtraBold', file: 'fonts/Pretendard-ExtraBold.woff2' },
            { name: 'Pretendard Black', file: 'fonts/Pretendard-Black.woff2' },
            // === D2 Coding (OFL) ===
            { name: 'D2Coding', file: 'fonts/D2Coding-Regular.woff2' },
            // === Happiness Sans ===
            { name: '해피니스 산스 레귤러', file: 'fonts/Happiness-Sans-Regular.woff2' },
            { name: 'Happiness Sans Regular', file: 'fonts/Happiness-Sans-Regular.woff2' },
            { name: '해피니스 산스 볼드', file: 'fonts/Happiness-Sans-Bold.woff2' },
            { name: 'Happiness Sans Bold', file: 'fonts/Happiness-Sans-Bold.woff2' },
            { name: '해피니스 산스 타이틀', file: 'fonts/Happiness-Sans-Title.woff2' },
            { name: 'Happiness Sans Title', file: 'fonts/Happiness-Sans-Title.woff2' },
            { name: '해피니스 산스 VF', file: 'fonts/HappinessSansVF.woff2' },
            { name: 'Happiness Sans VF', file: 'fonts/HappinessSansVF.woff2' },
            // === Cafe24 ===
            { name: 'Cafe24 Ssurround Bold', file: 'fonts/Cafe24Ssurround-v2.0.woff2' },
            { name: '카페24 슈퍼매직', file: 'fonts/Cafe24Supermagic-Regular-v1.0.woff2' },
            { name: 'Cafe24 Supermagic', file: 'fonts/Cafe24Supermagic-Regular-v1.0.woff2' },
            // === 기타 ===
            { name: 'SpoqaHanSans', file: 'fonts/SpoqaHanSans-Regular.woff2' },
            // === Gowun (OFL) ===
            { name: '고운바탕', file: 'fonts/GowunBatang-Regular.woff2' },
            { name: '고운돋움', file: 'fonts/GowunDodum-Regular.woff2' },
        ];
        // CSS @font-face 규칙 생성 + FontFace API 로드
        // Chrome Canvas 2D는 FontFace API만으로 로드한 폰트를 인식하지 못할 수 있으므로,
        // CSS @font-face 규칙도 함께 생성하여 브라우저가 폰트를 확실히 인식하도록 한다.
        console.log('웹폰트 로드 시작:', fonts.length + '개');

        // 1) CSS @font-face 규칙 생성 (Canvas 2D 호환)
        const style = document.createElement('style');
        style.textContent = fonts.map(f => {
            const fmt = f.format || 'woff2';
            return `@font-face { font-family: "${f.name}"; src: url("${f.file}") format("${fmt}"); font-display: block; }`;
        }).join('\n');
        document.head.appendChild(style);

        // 2) FontFace API로 폰트 데이터를 즉시 로드 (네트워크 요청 트리거)
        let loadedCount = 0, failedCount = 0;
        globalThis._fontLoadPromise = Promise.all(fonts.map(f => {
            const fmt = f.format || 'woff2';
            const face = new FontFace(f.name, `url(${f.file}) format('${fmt}')`);
            return face.load().then(loaded => {
                document.fonts.add(loaded);
                loadedCount++;
                return loaded;
            }).catch(e => {
                failedCount++;
                console.warn('폰트 로드 실패:', f.name, f.file, e);
                return null;
            });
        })).then(async (results) => {
            console.log(`웹폰트 로드 완료: ${loadedCount}개 성공, ${failedCount}개 실패`);
            await document.fonts.ready;
            return results;
        });
    })();

    // WASM에서 호출하는 텍스트 폭 측정 함수 (Canvas measureText + LRU 캐시)
    // layout.rs의 estimate_text_width()와 compute_char_positions()가 이 함수를 콜백한다.
    // webhwp 방식: 128 엔트리 LRU 캐시로 동일 폰트+문자 중복 측정 방지
    (function() {
        let ctx = null;
        let lastFont = '';
        const cache = new Map();  // Map은 삽입 순서 보존 → LRU 구현 용이
        const MAX_CACHE = 256;
        const EVICT_COUNT = 64;   // 25% 퇴거

        globalThis.measureTextWidth = function(font, text) {
            const key = font + '\0' + text;

            if (cache.has(key)) {
                const val = cache.get(key);
                // MRU로 이동 (삭제 후 재삽입)
                cache.delete(key);
                cache.set(key, val);
                return val;
            }

            if (!ctx) {
                ctx = document.createElement('canvas').getContext('2d');
            }
            if (font !== lastFont) {
                ctx.font = font;
                lastFont = font;
            }

            const width = ctx.measureText(text).width;

            // 용량 초과 시 가장 오래된 25% 퇴거
            if (cache.size >= MAX_CACHE) {
                const iter = cache.keys();
                for (let i = 0; i < EVICT_COUNT; i++) {
                    const k = iter.next().value;
                    if (k !== undefined) cache.delete(k);
                }
            }
            cache.set(key, width);
            return width;
        };
    })();
    </script>
</head>
<body>
    <header>
        <h1>rhwp 편집기</h1>
        <div class="header-controls">
            <a href="index.html" class="header-link">비교 모드</a>
            <input type="file" id="file-input" accept=".hwp">
            <label for="file-input" class="header-btn">HWP 파일 선택</label>
        </div>
    </header>

    <div id="toolbar" class="hidden">
        <div class="toolbar-group" id="toolbar-nav">
            <button id="prev-btn" class="toolbar-btn" disabled title="이전 페이지">&#9664;</button>
            <span id="page-info">1 / 1</span>
            <button id="next-btn" class="toolbar-btn" disabled title="다음 페이지">&#9654;</button>
        </div>

        <div class="toolbar-group" id="toolbar-zoom">
            <button id="zoom-out-btn" class="toolbar-btn" title="축소">&#8722;</button>
            <span id="zoom-level">100%</span>
            <button id="zoom-in-btn" class="toolbar-btn" title="확대">&#43;</button>
            <button id="zoom-fit-btn" class="toolbar-btn" title="페이지 맞춤">맞춤</button>
        </div>

        <div class="toolbar-group" id="toolbar-search">
            <input type="text" id="search-input" placeholder="검색..." class="toolbar-input">
            <button id="search-prev-btn" class="toolbar-btn" disabled title="이전 결과">&#9650;</button>
            <button id="search-next-btn" class="toolbar-btn" disabled title="다음 결과">&#9660;</button>
            <span id="search-info" class="hidden">0 / 0</span>
            <button id="search-clear-btn" class="toolbar-btn hidden" title="검색 초기화">&#10005;</button>
        </div>

        <div class="toolbar-group" id="toolbar-save">
            <button id="save-btn" class="toolbar-btn" title="HWP 파일로 저장 (Ctrl+S)">&#128190; 저장</button>
        </div>

        <div class="toolbar-group" id="toolbar-paramark">
            <button id="paramark-btn" class="toolbar-btn" title="문단부호 보이기/숨기기">&para;</button>
        </div>

        <div class="toolbar-group" id="toolbar-transparent-border">
            <button id="transparent-border-btn" class="toolbar-btn" title="투명 선 보이기/숨기기">&#9482;</button>
        </div>

        <div class="toolbar-group" id="toolbar-charshape">
            <button id="charshape-btn" class="toolbar-btn" title="글자 모양 (Alt+L)">Aa</button>
        </div>

        <div class="toolbar-group" id="toolbar-fileinfo">
            <div class="toolbar-dropdown-wrapper">
                <button id="fileinfo-btn" class="toolbar-btn" title="문서 정보">&#9432; 정보</button>
                <div id="fileinfo-popup" class="toolbar-popup hidden">
                    <div id="fileinfo-content"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="format-toolbar" class="hidden">
        <!-- 글꼴 -->
        <div class="fmt-group">
            <select id="fmt-font" class="fmt-select fmt-font-select" title="글꼴">
                <option value="">글꼴</option>
                <option value="함초롬돋움">함초롬돋움</option>
                <option value="함초롬바탕">함초롬바탕</option>
                <option value="맑은 고딕">맑은 고딕</option>
                <option value="돋움">돋움</option>
                <option value="굴림">굴림</option>
                <option value="바탕">바탕</option>
                <option value="HY헤드라인M">HY헤드라인M</option>
                <option value="HY견고딕">HY견고딕</option>
                <option value="HY그래픽">HY그래픽</option>
                <option value="HY견명조">HY견명조</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
            </select>
        </div>

        <!-- 글자 크기 -->
        <div class="fmt-group">
            <button id="fmt-size-down" class="fmt-btn fmt-size-btn" title="글자 크기 줄임">&#8722;</button>
            <input type="text" id="fmt-size" class="fmt-size-input" value="" title="글자 크기 (pt)">
            <button id="fmt-size-up" class="fmt-btn fmt-size-btn" title="글자 크기 키움">&#43;</button>
        </div>

        <!-- 글자 서식 -->
        <div class="fmt-group">
            <button id="fmt-bold" class="fmt-btn fmt-toggle" title="굵게 (Ctrl+B)"><b>B</b></button>
            <button id="fmt-italic" class="fmt-btn fmt-toggle" title="기울임 (Ctrl+I)"><i>I</i></button>
            <button id="fmt-underline" class="fmt-btn fmt-toggle" title="밑줄 (Ctrl+U)"><u>U</u></button>
            <button id="fmt-strike" class="fmt-btn fmt-toggle" title="취소선"><s>S</s></button>
        </div>

        <!-- 글자색 / 강조색 -->
        <div class="fmt-group">
            <div class="fmt-color-wrapper">
                <button id="fmt-text-color" class="fmt-btn" title="글자색">
                    <span class="fmt-color-label">A</span>
                    <span id="fmt-text-color-bar" class="fmt-color-bar" style="background:#000000;"></span>
                </button>
                <input type="color" id="fmt-text-color-picker" class="fmt-color-picker" value="#000000">
            </div>
            <div class="fmt-color-wrapper">
                <button id="fmt-shade-color" class="fmt-btn" title="강조색">
                    <span class="fmt-color-label fmt-shade-icon">&#9632;</span>
                    <span id="fmt-shade-color-bar" class="fmt-color-bar" style="background:transparent;"></span>
                </button>
                <input type="color" id="fmt-shade-color-picker" class="fmt-color-picker" value="#ffff00">
            </div>
        </div>

        <!-- 정렬 -->
        <div class="fmt-group">
            <button id="fmt-align-justify" class="fmt-btn fmt-toggle active" title="양쪽 정렬">&#9776;</button>
            <button id="fmt-align-left" class="fmt-btn fmt-toggle" title="왼쪽 정렬">&#8676;</button>
            <button id="fmt-align-center" class="fmt-btn fmt-toggle" title="가운데 정렬">&#8596;</button>
            <button id="fmt-align-right" class="fmt-btn fmt-toggle" title="오른쪽 정렬">&#8677;</button>
        </div>

        <!-- 줄간격 -->
        <div class="fmt-group">
            <select id="fmt-line-spacing" class="fmt-select fmt-spacing-select" title="줄간격">
                <option value="100">100%</option>
                <option value="120">120%</option>
                <option value="130">130%</option>
                <option value="140">140%</option>
                <option value="150">150%</option>
                <option value="160" selected>160%</option>
                <option value="180">180%</option>
                <option value="200">200%</option>
                <option value="250">250%</option>
                <option value="300">300%</option>
            </select>
        </div>

        <!-- 들여쓰기 -->
        <div class="fmt-group">
            <button id="fmt-indent-dec" class="fmt-btn" title="내어쓰기">&#8678;</button>
            <button id="fmt-indent-inc" class="fmt-btn" title="들여쓰기">&#8680;</button>
        </div>

        <!-- 글자 모양 -->
        <div class="fmt-group">
            <button id="fmt-charshape" class="fmt-btn" title="글자 모양 (Alt+L)">Aa</button>
        </div>
    </div>

    <main>
        <section id="editor-area">
            <p class="placeholder" id="editor-placeholder">HWP 파일을 선택하세요.</p>
            <div id="canvas-scaler">
                <div id="canvas-wrapper">
                    <canvas id="hwp-canvas" class="hidden"></canvas>
                    <canvas id="selection-canvas" class="hidden"></canvas>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>rhwp - Rust HWP Editor | <span id="version-info"></span></p>
    </footer>

    <!-- IME 입력용 숨겨진 textarea -->
    <textarea id="ime-input"
        style="position:absolute;left:-9999px;top:0;width:1px;height:1px;opacity:0;"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

    <!-- 표 컨텍스트 메뉴 -->
    <div id="table-context-menu" class="hidden"
         style="position:fixed;z-index:1000;background:#fff;border:1px solid #ccc;
                border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.15);
                padding:4px 0;min-width:160px;font-size:13px;">
        <ul style="list-style:none;margin:0;padding:0;">
            <li data-action="insertRowAbove" style="padding:6px 16px;cursor:pointer;">위에 행 삽입</li>
            <li data-action="insertRowBelow" style="padding:6px 16px;cursor:pointer;">아래에 행 삽입</li>
            <li style="border-top:1px solid #eee;margin:4px 0;"></li>
            <li data-action="insertColLeft" style="padding:6px 16px;cursor:pointer;">왼쪽에 열 삽입</li>
            <li data-action="insertColRight" style="padding:6px 16px;cursor:pointer;">오른쪽에 열 삽입</li>
            <li style="border-top:1px solid #eee;margin:4px 0;"></li>
            <li data-action="mergeCells" style="padding:6px 16px;cursor:pointer;">셀 병합</li>
            <li data-action="splitCells" style="padding:6px 16px;cursor:pointer;">셀 나누기</li>
        </ul>
    </div>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>로딩 중...</p>
    </div>

    <script src="font_substitution.js"></script>
    <script type="module" src="editor.js"></script>
</body>
</html>
