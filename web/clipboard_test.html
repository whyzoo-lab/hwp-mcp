<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>클립보드 포맷 확인 도구</title>
<style>
body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background: #f5f5f5; }
h1 { color: #333; }
.paste-area {
    border: 3px dashed #999; padding: 40px; text-align: center;
    font-size: 18px; color: #666; background: #fff; margin: 20px 0;
    min-height: 100px; cursor: text; border-radius: 8px;
}
.paste-area:focus { border-color: #4a90d9; outline: none; background: #f0f7ff; }
.result { margin: 10px 0; }
.result h2 { color: #2c5282; margin: 20px 0 10px; font-size: 16px; }
.format-box {
    background: #fff; border: 1px solid #ddd; border-radius: 4px;
    padding: 12px; margin: 8px 0; overflow-x: auto;
}
.format-box pre {
    margin: 0; white-space: pre-wrap; word-break: break-all;
    font-size: 13px; line-height: 1.5;
}
.type-badge {
    display: inline-block; background: #4a90d9; color: #fff;
    padding: 2px 8px; border-radius: 3px; font-size: 12px; margin-right: 5px;
}
.rendered { border: 1px solid #ccc; padding: 10px; background: #fff; margin: 8px 0; }
#btn-read { padding: 10px 20px; font-size: 14px; cursor: pointer;
    background: #4a90d9; color: #fff; border: none; border-radius: 4px; }
#btn-read:hover { background: #357abd; }
.info { color: #888; font-size: 13px; }
</style>
</head>
<body>
<h1>HWP 클립보드 포맷 확인 도구</h1>
<p class="info">
    HWP 편집기에서 표/텍스트/이미지를 복사(Ctrl+C)한 후, 아래 영역에 붙여넣기(Ctrl+V)하거나 버튼을 클릭하세요.
</p>

<div class="paste-area" id="paste-area" contenteditable="true" tabindex="0">
    여기에 Ctrl+V로 붙여넣기
</div>

<button id="btn-read">클립보드 직접 읽기 (Clipboard API)</button>

<div id="results"></div>

<script>
const pasteArea = document.getElementById('paste-area');
const results = document.getElementById('results');
const btnRead = document.getElementById('btn-read');

// Ctrl+V 이벤트로 클립보드 데이터 캡처
pasteArea.addEventListener('paste', (e) => {
    e.preventDefault();
    const dt = e.clipboardData;
    console.dir(dt);
    if (!dt) { results.innerHTML = '<p>clipboardData 없음</p>'; return; }

    let html = '';
    html += '<h2>ClipboardEvent.clipboardData</h2>';
    html += `<p>사용 가능한 타입: <b>${[...dt.types].join(', ')}</b></p>`;

    for (const type of dt.types) {
        const data = dt.getData(type);
        html += `<div class="result">`;
        html += `<span class="type-badge">${type}</span> (${data.length} chars)`;
        html += `<div class="format-box"><pre>${escapeHtml(data)}</pre></div>`;

        if (type === 'text/html') {
            html += `<h2>HTML 렌더링 결과</h2>`;
            html += `<div class="rendered"><iframe sandbox srcdoc="${escapeHtml(data)}" style="width:100%;height:300px;border:1px solid #ccc;"></iframe></div>`;

            // 표 감지
            const hasTable = /<table[\s>]/i.test(data);
            const hasImg = /<img[\s>]/i.test(data);
            const generator = data.match(/name=["']?Generator["']?\s+content=["']([^"']+)/i);
            const sourceApp = data.match(/SourceApp[^"]*"([^"]+)"/i);

            html += `<h2>감지 결과</h2>`;
            html += `<div class="format-box">`;
            html += `<pre>`;
            html += `표(table) 포함: ${hasTable ? 'YES' : 'NO'}\n`;
            html += `이미지(img) 포함: ${hasImg ? 'YES' : 'NO'}\n`;
            html += `Generator 메타: ${generator ? generator[1] : '없음'}\n`;
            html += `SourceApp: ${sourceApp ? sourceApp[1] : '없음'}\n`;

            // HWP 특징 패턴 확인
            const hwpPatterns = [
                [/hwp/i, 'hwp 문자열'],
                [/한[글컴]/i, '한글/한컴 문자열'],
                [/Hancom/i, 'Hancom 문자열'],
                [/mso-/i, 'MSO 스타일 (MS Office)'],
                [/class="xl/i, 'Excel 클래스'],
                [/StartFragment/i, 'StartFragment 마커'],
                [/EndFragment/i, 'EndFragment 마커'],
            ];
            html += `\n--- 출처 패턴 ---\n`;
            for (const [pat, desc] of hwpPatterns) {
                if (pat.test(data)) {
                    html += `  [O] ${desc}\n`;
                }
            }
            html += `</pre></div>`;
        }
        html += `</div>`;
    }

    results.innerHTML = html;
});

// Clipboard API로 직접 읽기
btnRead.addEventListener('click', async () => {
    try {
        const items = await navigator.clipboard.read();
        let html = '<h2>Clipboard API 결과</h2>';
        html += `<p>ClipboardItem 개수: ${items.length}</p>`;

        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            html += `<p>Item[${i}] 타입: <b>${item.types.join(', ')}</b></p>`;

            for (const type of item.types) {
                try {
                    const blob = await item.getType(type);
                    if (type.startsWith('text/')) {
                        const text = await blob.text();
                        html += `<div class="result">`;
                        html += `<span class="type-badge">${type}</span> (${text.length} chars, blob size: ${blob.size})`;
                        html += `<div class="format-box"><pre>${escapeHtml(text)}</pre></div>`;
                        html += `</div>`;
                    } else if (type.startsWith('image/')) {
                        const url = URL.createObjectURL(blob);
                        html += `<div class="result">`;
                        html += `<span class="type-badge">${type}</span> (blob size: ${blob.size})`;
                        html += `<div class="rendered"><img src="${url}" style="max-width:100%"/></div>`;
                        html += `</div>`;
                    } else {
                        html += `<div class="result">`;
                        html += `<span class="type-badge">${type}</span> (blob size: ${blob.size})`;
                        // 바이너리 hexdump (처음 200바이트)
                        const arr = new Uint8Array(await blob.arrayBuffer());
                        const hexLines = [];
                        for (let j = 0; j < Math.min(arr.length, 200); j += 16) {
                            const hex = Array.from(arr.slice(j, j + 16))
                                .map(b => b.toString(16).padStart(2, '0')).join(' ');
                            const ascii = Array.from(arr.slice(j, j + 16))
                                .map(b => b >= 32 && b < 127 ? String.fromCharCode(b) : '.').join('');
                            hexLines.push(`${j.toString(16).padStart(4, '0')}  ${hex.padEnd(48)}  ${ascii}`);
                        }
                        html += `<div class="format-box"><pre>${hexLines.join('\n')}</pre></div>`;
                        html += `</div>`;
                    }
                } catch (err) {
                    html += `<p style="color:red">${type} 읽기 실패: ${err.message}</p>`;
                }
            }
        }
        results.innerHTML = html;
    } catch (err) {
        results.innerHTML = `<p style="color:red">Clipboard API 오류: ${err.message}</p>`;
    }
});

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
