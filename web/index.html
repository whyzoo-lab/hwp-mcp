<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rhwp - HWP Viewer Test</title>
    <link rel="stylesheet" href="style.css">
    <script>
    // WASM에서 호출하는 텍스트 폭 측정 함수 (Canvas measureText 사용)
    (function() {
        let ctx = null;
        let lastFont = '';
        globalThis.measureTextWidth = function(font, text) {
            if (!ctx) {
                ctx = document.createElement('canvas').getContext('2d');
            }
            if (font !== lastFont) {
                ctx.font = font;
                lastFont = font;
            }
            return ctx.measureText(text).width;
        };
    })();
    </script>
</head>
<body>
    <header>
        <h1>rhwp 테스트 페이지</h1>
        <div class="header-controls">
            <a href="editor.html" class="file-label">편집 모드</a>
            <input type="file" id="file-input" accept=".hwp">
            <label for="file-input" class="file-label">HWP 파일 선택</label>
        </div>
    </header>

    <main>
        <section id="info-panel">
            <p class="placeholder">HWP 파일을 선택하세요.</p>
        </section>

        <section id="render-panel">
            <div id="svg-view">
                <h3>SVG 렌더링</h3>
                <div id="svg-container">
                    <p class="placeholder">파일을 로드하면 SVG가 여기에 표시됩니다.</p>
                </div>
            </div>
            <div id="canvas-view">
                <h3>Canvas 렌더링</h3>
                <div id="canvas-container">
                    <p class="placeholder" id="canvas-placeholder">파일을 로드하면 Canvas가 여기에 표시됩니다.</p>
                    <canvas id="hwp-canvas" class="hidden"></canvas>
                </div>
            </div>
        </section>

        <nav id="page-nav">
            <button id="prev-btn" disabled>&#9664; 이전</button>
            <span id="page-info">- / -</span>
            <button id="next-btn" disabled>다음 &#9654;</button>
        </nav>
    </main>

    <footer>
        <p>rhwp - Rust HWP Viewer | <span id="version-info"></span></p>
    </footer>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>로딩 중...</p>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
