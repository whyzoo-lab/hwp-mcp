services:
  hwpmcp-app:
    build:
      context: .
      dockerfile: Dockerfile.http
    image: rhwp-mcp-http:latest
    env_file: .env.hwpmcp
    environment:
      RHWP_BIND: 0.0.0.0:8300
    ports:
      - "127.0.0.1:8300:8300"   # 외부 비노출 — Caddy만 접근
    depends_on:
      - hwpmcp-db
      - hwpmcp-minio
    restart: unless-stopped

  hwpmcp-db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # postgres:18 이미지는 데이터 볼륨을 부모 디렉터리(/var/lib/postgresql)에 마운트해야 한다.
      # (/var/lib/postgresql/data 에 마운트하면 pg18이 "unused mount/volume" 오류로 기동 거부)
      - hwpmcp-db-data:/var/lib/postgresql
    restart: unless-stopped

  hwpmcp-minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - hwpmcp-minio-data:/data
    restart: unless-stopped

volumes:
  hwpmcp-db-data:
  hwpmcp-minio-data:
