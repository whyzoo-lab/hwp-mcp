name: CI

on:
  push:
    branches: [main, devel]
    tags: ['v*']
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  pull_request:
    branches: [main, devel]
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# [Task #1192 F] 같은 PR 에 새 push 가 오면 진행 중 run 을 취소해 중복 실행 제거.
# cancel-in-progress 는 PR 이벤트에서만 활성화 — devel/main push 머지 검증 run 은 보존.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # [Task #1109 / #1192 C] ubuntu-latest runner 의 미사용 사전 설치 toolchain 제거하여
      # cargo test (28 examples + integration tests) 빌드 시 디스크 한도 초과 방지.
      # [#1192] 캐시 정상 작동 확인 후 "크고 빠른" 항목(android/dotnet)만 남기고 축소.
      # 느린 docker prune --all / apt clean / ghc / CodeQL 정리는 제거. df -h 로 여유 확인.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --verbose

      # [Task #1192 A] canvas_layer_tree_matches_legacy* 는 feature gate 없는 lib 테스트로
      # 아래 "Run tests"(cargo test)에 이미 포함된다. 별도 step 은 순수 중복이라 제거.
      # (native-skia 테스트는 default feature 가 아니므로 전용 step 을 유지한다.)

      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown --lib

      - name: Install native Skia runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Native Skia tests
        run: cargo test --features native-skia skia --lib --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      # [Task #1109 / #1192 C] wasm-build job 도 build-and-test 와 동일 축소 패턴.
      # "크고 빠른" 항목(android/dotnet)만 제거. df -h 로 여유 확인.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhwp-wasm-pkg
          path: pkg/
          retention-days: 30
