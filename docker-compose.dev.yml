services:
  db-dev:
    image: postgres:18
    environment:
      POSTGRES_USER: rhwp
      POSTGRES_PASSWORD: rhwp
      POSTGRES_DB: rhwp
    ports: ["5433:5432"]
  minio-dev:
    image: minio/minio:latest
    command: server /data --console-address ":9003"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9002:9000", "9003:9001"]
