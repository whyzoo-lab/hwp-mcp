<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>rhwp 로그인</title>
<style>
  :root {
    --brand: #4f46e5; --brand-2: #6366f1; --brand-ink: #3730a3;
    --ink: #1e1b3a; --muted: #6b7280; --line: #e5e7eb; --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--ink); margin: 0; min-height: 100vh;
    display: grid; place-items: center; padding: 1.5rem;
    background: linear-gradient(160deg, #eef2ff, #e0e7ff);
  }
  .card {
    width: 100%; max-width: 380px; background: #fff;
    border: 1px solid var(--line); border-radius: 16px; padding: 2rem 1.8rem;
    box-shadow: 0 20px 45px -20px rgba(49,46,129,.45);
  }
  .brand { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 1.4rem; }
  .mark {
    width: 52px; height: 52px; border-radius: 14px; display: grid; place-items: center;
    background: linear-gradient(140deg, var(--brand), var(--brand-2));
    color: #fff; font-weight: 800; font-size: 1.3rem; margin-bottom: .8rem;
    box-shadow: 0 10px 24px -10px rgba(79,70,229,.6);
  }
  .brand h1 { font-size: 1.2rem; margin: 0; }
  .brand p { color: var(--muted); font-size: .85rem; margin: .35rem 0 0; }
  .field { margin: .65rem 0; }
  .field label { display: block; font-size: .78rem; color: var(--muted); font-weight: 600; margin-bottom: .3rem; }
  input {
    width: 100%; font-size: .95rem; padding: .65rem .8rem;
    border: 1px solid var(--line); border-radius: 10px; background: #fbfbfe;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus { outline: none; border-color: var(--brand-2); box-shadow: 0 0 0 3px rgba(99,102,241,.18); background: #fff; }
  button {
    width: 100%; margin-top: 1rem; font-size: .95rem; font-weight: 600;
    padding: .7rem 1rem; border: 0; border-radius: 10px; cursor: pointer;
    background: linear-gradient(140deg, var(--brand), var(--brand-2)); color: #fff;
    transition: filter .15s, transform .05s;
  }
  button:hover { filter: brightness(1.05); }
  button:active { transform: translateY(1px); }
  .msg { display: block; text-align: center; color: var(--danger); font-size: .85rem; min-height: 1.2em; margin-top: .8rem; }
  .hint { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 1.2rem; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="mark">한</div>
    <h1>rhwp 문서 서비스</h1>
    <p>Claude 연결을 위해 로그인하세요</p>
  </div>
  <div class="field">
    <label for="u">사용자명</label>
    <input id="u" type="text" placeholder="아이디" autocomplete="username" />
  </div>
  <div class="field">
    <label for="p">비밀번호</label>
    <input id="p" type="password" placeholder="비밀번호" autocomplete="current-password" />
  </div>
  <button onclick="go()">로그인 후 계속</button>
  <span id="m" class="msg"></span>
  <p class="hint">로그인하면 Claude가 이 계정의 문서에 접근하도록 승인됩니다.</p>
</div>
<script>
async function go() {
  const r = await fetch('/api/login', {method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({username: u.value, password: p.value})});
  if (r.ok) { location.reload(); } else { m.textContent = '로그인 실패 — 아이디 또는 비밀번호를 확인하세요'; }
}
['u','p'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') go(); }));
</script>
</body>
</html>
